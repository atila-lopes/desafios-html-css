<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>

<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag
        deverá utilizar em cada caso.</p>
    <ul>
        <li title="Use a tag &lt;p&gt;"><u>Parágrafo</u></li>
        <li title="Use a tag &lt;h1&gt;"><u>Cabeçalho</u></li>
        <li title="Use a tag &lt;img&gt;"><u>Imagens</u></li>
        <li title="Use a tag &lt;abbr&gt;"><u>Abreviações</u></li>
        <li title="Use a tag &lt;code&gt;"><u>Códigos-font</u></li>
        <li title="Use a tag &lt;ul&gt;"><u>Listas numeradas</u></li>
        <li title="Use a tag &lt;ol&gt;"><u>Listas com demarcadores</u></li>
    </ul>
</body>

</html>
